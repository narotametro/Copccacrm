<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Build: 2026-02-25-09:45 -->
    <!-- Aggressive Cache Prevention -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="cache" content="no-cache" />
    <meta name="revisit-after" content="1 days" />
    <!-- Favicons -->
    <link rel="shortcut icon" href="/favicon.png" type="image/png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="COPCCA CRM - Modern CRM System with AI-powered insights" />
    <meta name="theme-color" content="#4f46e5" />
    <title>COPCCA CRM</title>
  </head>
  <body>
    <div id="root">
      <!-- Instant loading screen - shows BEFORE React loads -->
      <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);">
        <div style="width: 32px; height: 32px; border: 3px solid #bfdbfe; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
      </div>
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Silent version check - NO automatic reloads -->
    <script>
      // Version check - notify user only, never force reload
      const BUILD_VERSION = '2026-02-25-09:45';
      
      // Check for new version every 30 minutes (less aggressive)
      setInterval(async () => {
        try {
          const response = await fetch('/index.html', { 
            cache: 'no-store',
            headers: { 'Cache-Control': 'no-cache' }
          });
          const html = await response.text();
          const match = html.match(/Build: ([\d-:]+)/);
          
          if (match && match[1] !== BUILD_VERSION) {
            console.log('New version available - will apply on next page navigation');
            // Just clear caches silently - NO reload
            // User continues working uninterrupted
            if ('caches' in window) {
              const cacheNames = await caches.keys();
              await Promise.all(cacheNames.map(name => caches.delete(name)));
            }
            localStorage.setItem('update_available', 'true');
          }
        } catch (e) {
          // Silently fail - network might be offline
        }
      }, 30 * 60 * 1000); // Check every 30 minutes (less disruptive)
    </script>
  </body>
</html>
