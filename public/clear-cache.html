<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Cache - COPCCA CRM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      padding: 48px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    
    h1 {
      color: #1a202c;
      font-size: 32px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    
    .status {
      padding: 16px;
      border-radius: 12px;
      margin: 24px 0;
      font-weight: 600;
    }
    
    .status.loading {
      background: #fff3cd;
      color: #856404;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    
    .info {
      color: #666;
      line-height: 1.6;
      margin: 24px 0;
    }
    
    .button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin: 12px 0;
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .details {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin: 24px 0;
      text-align: left;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .details div {
      margin: 8px 0;
      padding: 4px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .details div:last-child {
      border-bottom: none;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    
    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    
    .back-link:hover {
      color: #764ba2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🧹</div>
    <h1>Clear All Caches</h1>
    
    <div class="status loading" id="status">
      Checking cache status...
    </div>
    
    <div class="info">
      <p><strong>Having 404 errors or seeing old content?</strong></p>
      <p>This tool will completely clear all cached data and service workers.</p>
      <p>After clearing, the app will reload with fresh content.</p>
    </div>
    
    <div class="details" id="details" style="display: none;">
      <!-- Cache details will be populated here -->
    </div>
    
    <button class="button" id="clearButton" onclick="clearEverything()">
      Clear All Caches Now
    </button>
    
    <a href="/" class="back-link">← Back to App</a>
  </div>

  <script>
    let cacheInfo = [];

    // Check cache status on load
    async function checkCacheStatus() {
      const statusEl = document.getElementById('status');
      const detailsEl = document.getElementById('details');
      const clearButton = document.getElementById('clearButton');
      
      cacheInfo = [];
      
      try {
        // Check service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          cacheInfo.push(`Service Workers: ${registrations.length} registered`);
          registrations.forEach((reg, i) => {
            cacheInfo.push(`  - SW ${i + 1}: ${reg.active?.scriptURL || 'inactive'}`);
          });
        } else {
          cacheInfo.push('Service Workers: Not supported');
        }
        
        // Check caches
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          cacheInfo.push(`Cache Storage: ${cacheNames.length} caches`);
          cacheNames.forEach(name => {
            cacheInfo.push(`  - ${name}`);
          });
        } else {
          cacheInfo.push('Cache Storage: Not supported');
        }
        
        // Check localStorage
        const localStorageSize = Object.keys(localStorage).length;
        cacheInfo.push(`LocalStorage: ${localStorageSize} items`);
        
        // Check sessionStorage
        const sessionStorageSize = Object.keys(sessionStorage).length;
        cacheInfo.push(`SessionStorage: ${sessionStorageSize} items`);
        
        // Display info
        detailsEl.innerHTML = cacheInfo.map(info => `<div>${info}</div>`).join('');
        detailsEl.style.display = 'block';
        
        // Update status
        const totalItems = cacheInfo.length;
        if (totalItems > 4) { // More than just the headers
          statusEl.className = 'status loading';
          statusEl.textContent = '⚠️ Found cached data - click below to clear';
        } else {
          statusEl.className = 'status success';
          statusEl.textContent = '✅ No cached data found';
        }
        
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.textContent = '❌ Error checking cache status';
        console.error('Cache check error:', error);
      }
    }

    // Clear everything
    async function clearEverything() {
      const statusEl = document.getElementById('status');
      const clearButton = document.getElementById('clearButton');
      
      clearButton.disabled = true;
      statusEl.className = 'status loading';
      statusEl.textContent = '🧹 Clearing all caches...';
      
      let cleared = [];
      
      try {
        // 1. Unregister ALL service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(reg => reg.unregister()));
          cleared.push(`Unregistered ${registrations.length} service worker(s)`);
        }
        
        // 2. Delete ALL cache storage
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(name => caches.delete(name)));
          cleared.push(`Deleted ${cacheNames.length} cache(s)`);
        }
        
        // 3. Clear localStorage (except theme preference)
        const themePreference = localStorage.getItem('theme');
        const itemCount = Object.keys(localStorage).length;
        localStorage.clear();
        if (themePreference) {
          localStorage.setItem('theme', themePreference);
        }
        cleared.push(`Cleared ${itemCount} localStorage item(s)`);
        
        // 4. Clear sessionStorage
        const sessionCount = Object.keys(sessionStorage).length;
        sessionStorage.clear();
        cleared.push(`Cleared ${sessionCount} sessionStorage item(s)`);
        
        // Success!
        statusEl.className = 'status success';
        statusEl.innerHTML = `
          <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
          <div>All caches cleared successfully!</div>
          <div style="margin-top: 12px; font-size: 14px; opacity: 0.8;">
            ${cleared.join(' • ')}
          </div>
          <div style="margin-top: 16px; font-weight: bold;">
            Reloading in 3 seconds...
          </div>
        `;
        
        // Reload after 3 seconds
        setTimeout(() => {
          window.location.href = '/';
        }, 3000);
        
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.textContent = '❌ Error clearing caches: ' + error.message;
        clearButton.disabled = false;
        console.error('Clear error:', error);
      }
    }

    // Check status on load
    checkCacheStatus();
  </script>
</body>
</html>
