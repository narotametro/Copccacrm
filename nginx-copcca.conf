# ========================================
# NGINX CONFIGURATION FOR COPCCA CRM
# ========================================
# This is the COMPLETE Nginx configuration for a Vite/React SPA
# deployed to DigitalOcean
#
# USAGE:
#   1. SSH into your DigitalOcean server
#   2. sudo nano /etc/nginx/sites-available/default
#   3. Copy this entire file content
#   4. Update the server_name to your domain
#   5. sudo nginx -t (test configuration)
#   6. sudo systemctl restart nginx
#
# This fixes:
#   ✅ 404 on routes (/customers, /dashboard, etc.)
#   ✅ 404 on refresh
#   ✅ 404 on hashed JS files
#   ✅ Slow load times
#   ✅ Caching issues
# ========================================

server {
    # ========================================
    # BASIC SERVER CONFIGURATION
    # ========================================
    
    # Listen on port 80 (HTTP)
    listen 80;
    listen [::]:80;
    
    # ⚠️ UPDATE THIS TO YOUR DOMAIN
    server_name yourdomain.com www.yourdomain.com;
    
    # Root directory where your built files are located
    root /var/www/html;
    
    # Default index file
    index index.html;
    
    # Server tokens (security - hide Nginx version)
    server_tokens off;
    
    # ========================================
    # SPA ROUTING (CRITICAL FOR REACT/VITE)
    # ========================================
    
    # This is THE MOST IMPORTANT part for fixing 404s
    # Always return index.html for any route, let React handle routing
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # ========================================
    # STATIC ASSETS CACHING
    # ========================================
    
    # Cache immutable assets (hashed JS/CSS) for 1 year
    # These have unique names when content changes, so safe to cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Allow CORS if needed (for fonts, etc.)
        add_header Access-Control-Allow-Origin "*";
        
        # Serve pre-compressed files if available
        gzip_static on;
    }
    
    # ========================================
    # INDEX.HTML - NEVER CACHE
    # ========================================
    
    # Always serve fresh index.html so users get latest version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
    
    # ========================================
    # SERVICE WORKER - SPECIAL HANDLING
    # ========================================
    
    # Service workers must never be cached
    location ~* (service-worker\.js|sw\.js|workbox-.*\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Service-Worker-Allowed "/";
    }
    
    # PWA manifest
    location ~* \.webmanifest$ {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # ========================================
    # COMPRESSION (FASTER LOAD TIMES)
    # ========================================
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml
        image/x-icon;
    
    # ========================================
    # SECURITY HEADERS
    # ========================================
    
    # Add security headers to all responses
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Content Security Policy (adjust as needed)
    # Uncomment and customize for your needs
    # add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:;" always;
    
    # ========================================
    # ERROR PAGES
    # ========================================
    
    # Custom error pages (optional)
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
    
    # ========================================
    # API PROXY (IF NEEDED)
    # ========================================
    
    # If you need to proxy API requests to another server
    # Uncomment and adjust as needed
    #
    # location /api/ {
    #     proxy_pass http://localhost:3000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    
    # ========================================
    # FILE SIZE LIMITS
    # ========================================
    
    # Max upload size (for file uploads)
    client_max_body_size 10M;
    
    # ========================================
    # ACCESS LOG
    # ========================================
    
    # Access log location
    access_log /var/log/nginx/copcca_access.log;
    error_log /var/log/nginx/copcca_error.log;
}

